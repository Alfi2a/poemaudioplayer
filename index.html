<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Player with Categories</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <!-- Playlist -->
  <div class="playlist" id="playlist"></div>

  <!-- Main Player -->
  <div class="player" id="main-player">
    <h2 id="title"></h2>
    <h3 id="author"></h3>

    <audio id="audio"></audio>
    <input type="range" id="progress" value="0" min="0" max="100">

    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
      <button id="loop">↺</button>
      <button id="popout">↗</button>
    </div>

    <div id="nextTrack"></div>

    <div class="text-panel">
      <h4>Text for Audio:</h4>
      <pre id="textContent"></pre>
    </div>
  </div>

  <!-- Interpretation Player -->
  <div class="player" id="interp-player">
    <h2 id="title2"></h2>
    <h3 id="author2"></h3>

    <audio id="audio2"></audio>
    <input type="range" id="progress2" value="0" min="0" max="100">

    <div class="controls">
      <button id="prev2">⏮</button>
      <button id="play2">▶</button>
      <button id="next2">⏭</button>
      <button id="loop2">↺</button>
      <button id="popout2">↗</button>
    </div>

    <div id="nextTrack2"></div>

    <div class="text-panel">
      <h4>Interpretation Text:</h4>
      <pre id="textContent2"></pre>
    </div>
  </div>

</div>

<!-- Sortable.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="code.js"></script>
</body>
</html>
